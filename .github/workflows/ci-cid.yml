#Here we are creating a basic github actions pipeline
name: node-js-pipeline
on:
  push:
    branches:
      - main
jobs:
  project-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setting up node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - name: Installing node dependencies
        run: npm ci
  docker-build:
    runs-on: ubuntu-latest
    needs:
      - project-build
    steps:
      - name: Checking out the code
        uses: actions/checkout@v4
      - name: Setting up a docker build
        # Here we are using the builder engine
        uses: docker/setup-buildx-action@v3
      - name: Layering cache
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: |
            node-app:${{ github.sha }}
            node-app: latest
          cache-from: type=gha
          cache-to: type=gha, mod=max
      - name: Setting up the docker compose
        run: |
          docker compose up -d
          docker compose ps
          docker compose down
